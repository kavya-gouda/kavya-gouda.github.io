<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teknologi - Posts</title>
    <style>
      :root {
        --bg-0: #081122;
        --bg-1: #10213e;
        --text: #ecf2ff;
        --muted: #a9b7d0;
        --muted-strong: #c7d3e8;
        --pill: #2d7de7;
        --pill-border: rgba(66, 153, 255, 0.6);
        --nav-border: rgba(255, 255, 255, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background:
          radial-gradient(900px 520px at 108% 58%, rgba(53, 126, 255, 0.27), transparent 70%),
          radial-gradient(1100px 640px at 72% 78%, rgba(31, 74, 168, 0.33), transparent 70%),
          linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
        color: var(--text);
        min-height: 100vh;
      }

      .site-nav {
        border-bottom: 1px solid var(--nav-border);
        background: rgba(8, 17, 34, 0.82);
        backdrop-filter: blur(6px);
      }

      .site-nav .inner {
        max-width: 1240px;
        margin: 0 auto;
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .brand {
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        text-decoration: none;
        letter-spacing: 0.2px;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 26px;
      }

      .nav-links a {
        color: var(--text);
        text-decoration: none;
        font-size: 30px;
        font-weight: 700;
        opacity: 0.9;
      }

      .nav-links a.active {
        text-decoration: underline;
        text-underline-offset: 8px;
      }

      .wrap {
        max-width: 1240px;
        margin: 0 auto;
        padding: 92px 28px 96px;
      }

      h1 {
        margin: 0 0 56px;
        font-size: 64px;
        line-height: 1.05;
        letter-spacing: 0.2px;
      }

      .year-group {
        margin-bottom: 56px;
      }

      .year {
        margin: 0 0 30px;
        color: var(--muted-strong);
        font-size: 46px;
        font-weight: 700;
      }

      .post-item {
        margin-bottom: 46px;
      }

      .post-title {
        color: var(--text);
        text-decoration: none;
        font-size: 46px;
        line-height: 1.2;
        font-weight: 750;
        display: inline-block;
        margin-bottom: 10px;
      }

      .post-meta {
        color: var(--muted);
        margin: 0;
        font-size: 30px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .dot {
        opacity: 0.75;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        color: var(--pill);
        border: 1px solid var(--pill-border);
        border-radius: 999px;
        font-size: 20px;
        line-height: 1;
        padding: 7px 12px 8px;
      }

      .empty {
        color: var(--muted);
        font-size: 24px;
        margin-top: 18px;
      }

      @media (max-width: 1100px) {
        .brand {
          font-size: 23px;
        }
        .nav-links a {
          font-size: 20px;
        }
        .wrap {
          padding-top: 58px;
        }
        h1 {
          font-size: 48px;
          margin-bottom: 40px;
        }
        .year {
          font-size: 36px;
        }
        .post-title {
          font-size: 33px;
        }
        .post-meta {
          font-size: 23px;
        }
        .tag {
          font-size: 16px;
        }
      }

      @media (max-width: 680px) {
        .site-nav .inner {
          padding: 12px 16px;
        }
        .nav-links {
          gap: 12px;
        }
        .nav-links a {
          font-size: 15px;
        }
        .brand {
          font-size: 20px;
        }
        .wrap {
          padding: 38px 16px 52px;
        }
        h1 {
          font-size: 40px;
          margin-bottom: 30px;
        }
        .year {
          font-size: 31px;
          margin-bottom: 22px;
        }
        .post-item {
          margin-bottom: 34px;
        }
        .post-title {
          font-size: 27px;
        }
        .post-meta {
          font-size: 18px;
        }
        .tag {
          font-size: 14px;
          padding: 6px 10px 7px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="site-nav" aria-label="Main navigation">
      <div class="inner">
        <a class="brand" href="index.html">Teknologi</a>
        <div class="nav-links">
          <a class="active" href="index.html">Posts</a>
          <a href="#">About</a>
          <a href="#">Resources</a>
          <a href="#">Tags</a>
        </div>
      </div>
    </nav>

    <div class="wrap">
      <h1>Posts</h1>

      <main>
        <div id="posts" aria-live="polite"></div>
        <div id="empty" class="empty" style="display:none;">No posts yet.</div>
      </main>
    </div>

    <script>
      async function loadPosts() {
        const res = await fetch("posts.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load posts.json");
        return await res.json();
      }

      function formatDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toLocaleDateString("en-GB", {
          day: "numeric",
          month: "long",
          year: "numeric"
        });
      }

      function wordsFromMarkdown(md) {
        if (!md) return 0;
        const cleaned = String(md)
          .replace(/```[\s\S]*?```/g, " ")
          .replace(/`[^`]*`/g, " ")
          .replace(/\!\[[^\]]*\]\([^)]+\)/g, " ")
          .replace(/\[[^\]]*\]\([^)]+\)/g, " ")
          .replace(/[#>*_\-\n]/g, " ");
        const words = cleaned.trim().split(/\s+/).filter(Boolean);
        return words.length;
      }

      function readingTimeFromMarkdown(md) {
        const words = wordsFromMarkdown(md);
        return Math.max(1, Math.ceil(words / 200));
      }

      async function addDerivedFields(items) {
        const enriched = [];
        for (const post of items) {
          const p = { ...post };
          if (!p.readingTimeMinutes) {
            try {
              const mdPath = p.mdPath || `posts/${encodeURIComponent(p.slug)}/post.md`;
              const md = await fetch(mdPath, { cache: "no-store" }).then((r) =>
                r.ok ? r.text() : Promise.resolve("")
              );
              p.readingTimeMinutes = readingTimeFromMarkdown(md);
            } catch {
              p.readingTimeMinutes = 1;
            }
          }
          enriched.push(p);
        }
        return enriched;
      }

      function renderPosts(items) {
        const postsEl = document.getElementById("posts");
        const emptyEl = document.getElementById("empty");
        postsEl.innerHTML = "";

        if (!items || items.length === 0) {
          emptyEl.style.display = "block";
          return;
        }

        emptyEl.style.display = "none";

        const sorted = items
          .slice()
          .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));

        const groups = sorted.reduce((acc, p) => {
          const year = p.date ? String(p.date).slice(0, 4) : "Other";
          if (!acc[year]) acc[year] = [];
          acc[year].push(p);
          return acc;
        }, {});

        Object.keys(groups)
          .sort((a, b) => b.localeCompare(a))
          .forEach((year) => {
            const yearGroup = document.createElement("section");
            yearGroup.className = "year-group";

            const yearEl = document.createElement("h2");
            yearEl.className = "year";
            yearEl.textContent = year;
            yearGroup.appendChild(yearEl);

            groups[year].forEach((p) => {
              const item = document.createElement("article");
              item.className = "post-item";

              const title = document.createElement("a");
              title.className = "post-title";
              title.href = `post.html?slug=${encodeURIComponent(p.slug)}`;
              title.textContent = p.title || p.slug;

              const meta = document.createElement("p");
              meta.className = "post-meta";
              const dateText = p.date ? formatDate(p.date) : "";
              const minutes = Number(p.readingTimeMinutes || 1);
              meta.innerHTML = `${dateText} <span class="dot">·</span> ${minutes} mins`;

              item.appendChild(title);
              item.appendChild(meta);

              if (Array.isArray(p.tags) && p.tags.length) {
                const tags = document.createElement("div");
                tags.className = "tags";
                p.tags.forEach((t) => {
                  const el = document.createElement("span");
                  el.className = "tag";
                  el.textContent = String(t);
                  tags.appendChild(el);
                });
                item.appendChild(tags);
              }

              yearGroup.appendChild(item);
            });

            postsEl.appendChild(yearGroup);
          });
      }

      loadPosts()
        .then(addDerivedFields)
        .then(renderPosts)
        .catch((err) => {
          console.error(err);
          document.getElementById("empty").style.display = "block";
          document.getElementById("empty").textContent = "Could not load posts.";
        });
    </script>
  </body>
</html>
