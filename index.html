<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: #121a33;
        --text: #e8ecff;
        --muted: #a9b2d6;
        --link: #7aa2ff;
        --border: rgba(255, 255, 255, 0.12);
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1000px 600px at 20% -10%, rgba(122, 162, 255, 0.35), transparent),
          radial-gradient(800px 500px at 90% 0%, rgba(110, 231, 183, 0.22), transparent), var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 18px;
      }
      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 28px;
      }
      h1 {
        font-size: 28px;
        margin: 0;
        letter-spacing: 0.2px;
      }
      .subtitle {
        color: var(--muted);
        margin: 0;
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .card {
        background: rgba(18, 26, 51, 0.85);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px 16px;
      }
      .card a {
        color: var(--link);
        text-decoration: none;
        font-weight: 650;
        font-size: 16px;
      }
      .meta {
        color: var(--muted);
        font-size: 13px;
        margin-top: 8px;
      }
      .empty {
        color: var(--muted);
        padding: 16px 0;
      }
      footer {
        margin-top: 30px;
        color: var(--muted);
        font-size: 12px;
        border-top: 1px solid var(--border);
        padding-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Blog</h1>
          <p class="subtitle">Simple markdown posts served via GitHub Pages.</p>
        </div>
      </header>

      <main>
        <div id="posts" class="grid" aria-live="polite"></div>
        <div id="empty" class="empty" style="display:none;">No posts yet. Add files under <code>posts/&lt;slug&gt;/post.md</code>.</div>
      </main>

      <footer>
        Tip: add a new post as <code>posts/&lt;slug&gt;/post.md</code> (title from the first <code># Heading</code>). An auto-action will update <code>posts.json</code> for you.
      </footer>
    </div>

    <script>
      async function loadPosts() {
        const res = await fetch("posts.json", { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load posts.json");
        return await res.json();
      }

      function formatDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return iso;
        return d.toISOString().slice(0, 10);
      }

      function renderPosts(items) {
        const postsEl = document.getElementById("posts");
        const emptyEl = document.getElementById("empty");
        postsEl.innerHTML = "";

        if (!items || items.length === 0) {
          emptyEl.style.display = "block";
          return;
        }

        emptyEl.style.display = "none";

        // Sort newest first (by date string).
        items
          .slice()
          .sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))
          .forEach((p) => {
            const card = document.createElement("div");
            card.className = "card";
            const title = document.createElement("a");
            title.href = `post.html?slug=${encodeURIComponent(p.slug)}`;
            title.textContent = p.title || p.slug;

            const meta = document.createElement("div");
            meta.className = "meta";
            meta.textContent = p.date ? `Published ${formatDate(p.date)}` : "";

            card.appendChild(title);
            if (meta.textContent) card.appendChild(meta);
            postsEl.appendChild(card);
          });
      }

      loadPosts()
        .then(renderPosts)
        .catch((err) => {
          console.error(err);
          document.getElementById("empty").style.display = "block";
          document.getElementById("empty").textContent =
            "Could not load posts. Check that `posts.json` exists at the site root.";
        });
    </script>
  </body>
</html>
